services:
  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${GOOGLE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_SHEET_NAME: ${GOOGLE_SHEET_NAME:-Leads}
      LOCAL_TIMEZONE: ${LOCAL_TIMEZONE:-UTC}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-1}
      MAX_RETRY_ATTEMPTS: ${MAX_RETRY_ATTEMPTS:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["python", "bot.py"]
    restart: unless-stopped
    networks:
      - lead-network

  telegram-bot-test:
    build:
      context: ./bot
      dockerfile: Dockerfile
    command: ["python", "-m", "pytest", "tests", "-q"]
    profiles: ["test"]
    networks:
      - lead-network

  web-assistant:
    image: nginx:1.27-alpine
    command: ["/bin/sh", "-c", "echo 'web-assistant placeholder' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"]
    expose:
      - "8000"
    networks:
      - lead-network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web-assistant
    restart: unless-stopped
    networks:
      - lead-network

networks:
  lead-network:
    driver: bridge
