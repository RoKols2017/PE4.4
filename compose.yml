name: ${COMPOSE_PROJECT_NAME:-lead-capture}

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lead-network

  telegram-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
      target: production
    image: ${TELEGRAM_BOT_IMAGE:-pe44-telegram-bot:local}
    env_file: .env
    command: ["python", "bot.py"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from pathlib import Path; import sys; cmdline = Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'bot.py' in cmdline else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lead-network

  web-assistant:
    build:
      context: ./web_assistant
      dockerfile: Dockerfile
      target: production
    image: ${WEB_ASSISTANT_IMAGE:-pe44-web-assistant:local}
    env_file: .env
    command: ["python", "app.py"]
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3); sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lead-network

  caddy:
    image: caddy:2.10-alpine
    env_file: .env
    depends_on:
      web-assistant:
        condition: service_healthy
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --spider -q https://localhost/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *default-logging
    networks:
      - lead-network

  telegram-bot-test:
    build:
      context: ./bot
      dockerfile: Dockerfile
      target: development
    env_file: .env
    command: ["python", "-m", "pytest", "tests", "-q"]
    profiles: ["test"]
    networks:
      - lead-network

  web-assistant-test:
    build:
      context: ./web_assistant
      dockerfile: Dockerfile
      target: development
    env_file: .env
    command: ["python", "-m", "pytest", "tests", "-q"]
    profiles: ["test"]
    networks:
      - lead-network

networks:
  lead-network:
    driver: bridge

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
